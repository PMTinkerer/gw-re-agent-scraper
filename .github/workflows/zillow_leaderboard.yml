name: Zillow Leaderboard

on:
  workflow_dispatch:
    inputs:
      towns:
        description: 'Optional comma-separated towns (blank = all 10 towns)'
        default: ''
      batch_size:
        description: 'Number of profiles to scrape this run'
        default: '10'
      smoke_check:
        description: 'Run fast Zillow proxy smoke check first (true/false)'
        default: 'true'
      smoke_only:
        description: 'Only run the smoke check and skip full discovery/scrape (true/false)'
        default: 'false'
      discover:
        description: 'Run directory discovery before scraping (true/false)'
        default: 'true'
      scrape_profiles:
        description: 'Scrape pending Zillow profiles (true/false)'
        default: 'true'
      report_only:
        description: 'Skip discovery/scraping and regenerate Zillow outputs only (true/false)'
        default: 'false'
      use_firecrawl:
        description: 'Use Firecrawl API for directory discovery (bypasses PerimeterX, no proxy needed)'
        default: 'false'
      max_pages:
        description: 'Max directory pages per town when using Firecrawl (default: 5)'
        default: '5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: zillow-leaderboard
  cancel-in-progress: false

jobs:
  zillow:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          USE_FC="${{ github.event.inputs.use_firecrawl || 'false' }}"
          if [ "$USE_FC" != "true" ]; then
            python -m playwright install chromium --with-deps
          else
            echo "Firecrawl mode — skipping Playwright install"
          fi

      - name: Audit dependencies
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run Zillow pipeline
        env:
          CI: 'true'
          PROXY_URL: ${{ secrets.PROXY_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ZILLOW_STARTUP_DELAY_MIN: '25'
          ZILLOW_STARTUP_DELAY_MAX: '45'
          ZILLOW_WARMUP_DELAY_MIN: '3'
          ZILLOW_WARMUP_DELAY_MAX: '6'
          ZILLOW_DIRECTORY_DELAY_MIN: '8'
          ZILLOW_DIRECTORY_DELAY_MAX: '14'
          ZILLOW_PROFILE_DELAY_MIN: '5'
          ZILLOW_PROFILE_DELAY_MAX: '9'
          ZILLOW_PAGINATION_DELAY_MIN: '1'
          ZILLOW_PAGINATION_DELAY_MAX: '2'
          ZILLOW_BLOCK_BACKOFF_MIN: '25'
          ZILLOW_BLOCK_BACKOFF_MAX: '45'
          ZILLOW_RETRY_BACKOFF_MIN: '10'
          ZILLOW_RETRY_BACKOFF_MAX: '18'
          ZILLOW_DIRECTORY_ATTEMPTS: '3'
          ZILLOW_PROFILE_ATTEMPTS: '3'
        run: |
          USE_FC="${{ github.event.inputs.use_firecrawl || 'false' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '5' }}"

          if [ "$USE_FC" != "true" ] && [ -z "$PROXY_URL" ]; then
            echo "PROXY_URL secret is required for Playwright Zillow runs (use Firecrawl mode to skip)"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TOWNS="York,Kittery"
            BATCH="5"
            SMOKE_CHECK="true"
            SMOKE_ONLY="true"
            DISCOVER="false"
            SCRAPE="false"
            REPORT_ONLY="false"
          else
            TOWNS="${{ github.event.inputs.towns || '' }}"
            BATCH="${{ github.event.inputs.batch_size || '10' }}"
            SMOKE_CHECK="${{ github.event.inputs.smoke_check || 'true' }}"
            SMOKE_ONLY="${{ github.event.inputs.smoke_only || 'false' }}"
            DISCOVER="${{ github.event.inputs.discover || 'true' }}"
            SCRAPE="${{ github.event.inputs.scrape_profiles || 'true' }}"
            REPORT_ONLY="${{ github.event.inputs.report_only || 'false' }}"
          fi

          # Smoke check (Playwright mode only)
          if [ "$USE_FC" != "true" ] && [ "$SMOKE_CHECK" = "true" ]; then
            smoke_args=(--smoke-check --smoke-strict --smoke-output data/zillow_proxy_diagnostics.md)
            if [ -n "$TOWNS" ]; then smoke_args+=(--towns "$TOWNS"); fi
            python -m src.zillow_main "${smoke_args[@]}"
          fi

          if [ "$SMOKE_ONLY" = "true" ]; then
            exit 0
          fi

          # Build pipeline arguments
          args=()
          if [ "$REPORT_ONLY" = "true" ]; then
            args+=(--report-only)
          else
            if [ "$DISCOVER" = "true" ]; then args+=(--discover); fi
            if [ "$USE_FC" = "true" ]; then
              args+=(--use-firecrawl --max-pages "$MAX_PAGES" --directory-report)
            elif [ "$SCRAPE" = "true" ]; then
              args+=(--scrape-profiles --batch-size "$BATCH")
            fi
            if [ ${#args[@]} -eq 0 ] && [ "$USE_FC" != "true" ]; then
              args+=(--report-only)
            fi
          fi
          if [ -n "$TOWNS" ]; then args+=(--towns "$TOWNS"); fi

          echo "Running: python -m src.zillow_main ${args[*]}"
          python -m src.zillow_main "${args[@]}"

      - name: Publish Zillow smoke summary
        if: always()
        run: |
          if [ -f data/zillow_proxy_diagnostics.md ]; then
            echo "----- Zillow smoke diagnostics -----"
            cat data/zillow_proxy_diagnostics.md
            echo "----- End Zillow smoke diagnostics -----"
            cat data/zillow_proxy_diagnostics.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push results
        if: github.event_name == 'workflow_dispatch'
        run: |
          CURRENT_BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: zillow leaderboard $(date -u +%Y-%m-%d-%H%M)"
          git pull --rebase origin "$CURRENT_BRANCH" || {
            echo "Rebase failed, aborting and trying merge..."
            git rebase --abort || true
            git pull --no-rebase origin "$CURRENT_BRANCH"
          }
          git push origin "HEAD:$CURRENT_BRANCH" || {
            echo "Push failed, retrying once..."
            git pull --rebase origin "$CURRENT_BRANCH"
            git push origin "HEAD:$CURRENT_BRANCH"
          }

      - name: Prepare Pages artifact
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p _site
          cp data/index.html _site/index.html
          cp data/dashboard.html _site/dashboard.html
          cp data/dashboard.html _site/redfin.html
          if [ -f data/maine_dashboard.html ]; then
            cp data/maine_dashboard.html _site/maine_dashboard.html
            cp data/maine_dashboard.html _site/maine.html
          fi
          if [ -f data/zillow_directory_dashboard.html ]; then
            cp data/zillow_directory_dashboard.html _site/zillow_directory_dashboard.html
            cp data/zillow_directory_dashboard.html _site/zillow.html
          elif [ -f data/zillow_dashboard.html ]; then
            cp data/zillow_dashboard.html _site/zillow_dashboard.html
            cp data/zillow_dashboard.html _site/zillow.html
          fi
          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' _site; then
            echo "Conflict markers found in Pages artifact"
            exit 1
          fi
      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site/
      - name: Deploy to GitHub Pages
        if: github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
