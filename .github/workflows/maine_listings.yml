name: Maine Listings (MREIS MLS)

on:
  schedule:
    # Weekly: Mondays at 11:30 UTC (6:30am ET) — closed transactions
    - cron: '30 11 * * 1'
    # Daily: every day at 11:30 UTC (6:30am ET) — active listings
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        default: 'weekly'
        type: choice
        options:
          - weekly
          - backfill
          - daily-active
          - backfill-active
          - report-only
      workers:
        description: 'Concurrent workers for enrichment (1-50)'
        default: '10'
      batch_size:
        description: 'Enrichment batch size'
        default: '200'
      max_pages:
        description: 'Max search pages per town (discovery)'
        default: '90'
      max_credits:
        description: 'Hard cap on Firecrawl calls this run (empty = no cap)'
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: maine-listings
  cancel-in-progress: false

jobs:
  maine:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Determine effective mode
        id: pickmode
        run: |
          # Manual dispatch wins. Otherwise derive from cron schedule.
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "30 11 * * 1" ]; then
            MODE="weekly"
          elif [ "${{ github.event.schedule }}" = "30 11 * * *" ]; then
            MODE="daily-active"
          else
            MODE="weekly"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Effective mode: $MODE"

      - name: Run Maine Listings pipeline
        env:
          CI: 'true'
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          MODE="${{ steps.pickmode.outputs.mode }}"
          WORKERS="${{ github.event.inputs.workers || '10' }}"
          BATCH="${{ github.event.inputs.batch_size || '200' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '90' }}"
          MAX_CREDITS="${{ github.event.inputs.max_credits }}"
          CREDITS_ARG=""
          if [ -n "$MAX_CREDITS" ]; then
            CREDITS_ARG="--max-credits $MAX_CREDITS"
          fi

          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "FIRECRAWL_API_KEY secret is required"
            exit 1
          fi

          case "$MODE" in
            weekly)
              echo "Weekly incremental: discover new closings + enrich"
              python -m src.maine_main \
                --discover --recent-only --status Closed \
                --enrich --batch-size "$BATCH" \
                --workers "$WORKERS" --max-pages "$MAX_PAGES" \
                $CREDITS_ARG
              ;;
            backfill)
              echo "Full backfill: discover all + enrich all pending"
              python -m src.maine_main \
                --discover --status Closed \
                --enrich --batch-size "$BATCH" \
                --workers "$WORKERS" --max-pages "$MAX_PAGES" \
                $CREDITS_ARG
              ;;
            daily-active)
              echo "Daily active: discover actives + enrich + sweep withdrawn"
              python -m src.maine_main \
                --discover --recent-only --status Active \
                --enrich --batch-size "$BATCH" \
                --sweep --sweep-days 7 \
                --workers "$WORKERS" --max-pages "$MAX_PAGES" \
                $CREDITS_ARG
              ;;
            backfill-active)
              echo "Backfill active: full discovery of all current actives + enrich"
              python -m src.maine_main \
                --discover --status Active \
                --enrich --batch-size "$BATCH" \
                --workers "$WORKERS" --max-pages "$MAX_PAGES" \
                $CREDITS_ARG
              ;;
            report-only)
              echo "Report-only: regenerate dashboards from existing data"
              ;;
          esac

          python -m src.maine_main --report

      - name: Generate Maine leaderboard + dashboard
        run: |
          python -c "
          from src.maine_database import get_connection as gc_maine
          from src.database import get_connection as gc_redfin, get_zillow_connection
          from src.maine_report import generate_leaderboard
          from src.maine_dashboard import generate_maine_dashboard
          from src.index_page import generate_index_html

          maine_conn = gc_maine()
          generate_leaderboard(maine_conn)
          generate_maine_dashboard(maine_conn)
          generate_index_html(
              redfin_conn=gc_redfin(),
              zillow_conn=get_zillow_connection(),
              maine_conn=maine_conn,
          )
          "

      - name: Commit and push results
        run: |
          CURRENT_BRANCH="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: maine listings $(date -u +%Y-%m-%d-%H%M)"
          git pull --rebase origin "$CURRENT_BRANCH" || {
            git rebase --abort || true
            git pull --no-rebase origin "$CURRENT_BRANCH"
          }
          git push origin "HEAD:$CURRENT_BRANCH" || {
            git pull --rebase origin "$CURRENT_BRANCH"
            git push origin "HEAD:$CURRENT_BRANCH"
          }

      - name: Prepare Pages artifact
        if: always()
        run: |
          mkdir -p _site
          [ -f data/index.html ] && cp data/index.html _site/index.html
          [ -f data/dashboard.html ] && cp data/dashboard.html _site/redfin.html
          if [ -f data/zillow_directory_dashboard.html ]; then
            cp data/zillow_directory_dashboard.html _site/zillow.html
          elif [ -f data/zillow_dashboard.html ]; then
            cp data/zillow_dashboard.html _site/zillow.html
          fi
          [ -f data/maine_dashboard.html ] && cp data/maine_dashboard.html _site/maine.html

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
