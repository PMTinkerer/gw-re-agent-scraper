name: Scrape RE Agent Data

on:
  schedule:
    # During backfill (initial/enriching): runs 4x/day
    # After backfill complete (maintenance): only Sunday midnight UTC fires
    - cron: '0 6,12,18,0 * * *'
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      max_chunks:
        description: 'Number of chunks to process'
        default: '3'
      mode:
        description: 'initial, incremental, or auto'
        default: 'auto'
      source:
        description: 'Source filter (redfin or realtor, leave empty for both)'
        default: ''
      enrich_batch_size:
        description: 'Enrichment batch size (0 to skip enrichment)'
        default: '80'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # Phase-aware scheduling:
      #   initial    = CSV chunks still pending → run all 4 daily triggers
      #   enriching  = CSV done, enrichment backlog >10 → run all 4 daily triggers
      #   maintenance = everything done → only run Sunday midnight UTC
      - name: Detect phase
        if: github.event_name == 'schedule'
        id: phase
        run: |
          if [ -f data/scrape_state.json ]; then
            PHASE=$(python3 -c "
          import json, sqlite3

          state = json.load(open('data/scrape_state.json'))
          chunks = state.get('chunks', {})
          total = len(chunks)
          complete = sum(1 for c in chunks.values() if c.get('status') == 'complete')
          csv_done = total > 0 and complete >= total

          enrichment_pending = 0
          try:
              conn = sqlite3.connect('data/agent_data.db')
              enrichment_pending = conn.execute(
                  \"SELECT COUNT(*) FROM transactions WHERE (enrichment_status IS NULL OR (enrichment_status = 'error' AND enrichment_attempts < 3)) AND source_url IS NOT NULL\"
              ).fetchone()[0]
              conn.close()
          except Exception:
              enrichment_pending = 9999

          if not csv_done:
              print('initial')
          elif enrichment_pending > 10:
              print('enriching')
          else:
              print('maintenance')
          ")
          else
            PHASE="initial"
          fi
          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "Phase: $PHASE"

      - name: Skip if maintenance and not Sunday midnight
        if: github.event_name == 'schedule' && steps.phase.outputs.phase == 'maintenance'
        run: |
          DAY=$(date -u +%u)   # 7 = Sunday
          HOUR=$(date -u +%H)
          if [ "$DAY" != "7" ] || [ "$HOUR" != "00" ]; then
            echo "Maintenance mode — only running Sunday midnight UTC. Skipping."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          CHUNKS="${{ github.event.inputs.max_chunks || '3' }}"
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          SOURCE="${{ github.event.inputs.source || '' }}"

          CMD="python -m src.main --mode $MODE --max-chunks $CHUNKS"
          if [ -n "$SOURCE" ]; then
            CMD="$CMD --source $SOURCE"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Purge non-residential records
        run: |
          # Only purge if property_type column has been populated by the re-scrape
          TAGGED=$(python3 -c "
          import sqlite3
          conn = sqlite3.connect('data/agent_data.db')
          try:
              print(conn.execute('SELECT COUNT(*) FROM transactions WHERE property_type IS NOT NULL').fetchone()[0])
          except Exception:
              print(0)
          conn.close()
          ")
          echo "Records with property_type tagged: $TAGGED"
          if [ "$TAGGED" -gt "100" ]; then
            python -m src.main --purge-non-residential
          else
            echo "Not enough tagged records yet ($TAGGED). Skipping purge."
          fi

      - name: Run agent enrichment
        id: enrich
        env:
          CI: 'true'
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          BATCH="${{ github.event.inputs.enrich_batch_size || '80' }}"
          if [ "$BATCH" = "0" ]; then
            echo "Enrichment skipped (batch_size=0)."
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PENDING=$(python3 -c "
          import sqlite3
          conn = sqlite3.connect('data/agent_data.db')
          try:
              count = conn.execute(
                  'SELECT COUNT(*) FROM transactions WHERE (enrichment_status IS NULL OR (enrichment_status = \"error\" AND enrichment_attempts < 3)) AND source_url IS NOT NULL'
              ).fetchone()[0]
          except Exception:
              count = conn.execute(
                  'SELECT COUNT(*) FROM transactions WHERE listing_agent IS NULL AND source_url IS NOT NULL'
              ).fetchone()[0]
          print(count)
          conn.close()
          ")
          echo "pending_before=$PENDING" >> $GITHUB_OUTPUT
          echo "Pending enrichment: $PENDING"
          if [ "$PENDING" -gt "0" ]; then
            python -m src.main --enrich --batch-size "$BATCH"
          else
            echo "No URLs pending enrichment, skipping."
          fi

      - name: Health check
        id: health
        if: always() && steps.enrich.outputs.skipped != 'true'
        run: |
          python3 -c "
          import sqlite3, os

          conn = sqlite3.connect('data/agent_data.db')

          total = conn.execute('SELECT COUNT(*) FROM transactions WHERE source_url IS NOT NULL').fetchone()[0]
          success = conn.execute(\"SELECT COUNT(*) FROM transactions WHERE enrichment_status = 'success'\").fetchone()[0]
          no_agent = conn.execute(\"SELECT COUNT(*) FROM transactions WHERE enrichment_status = 'no_agent'\").fetchone()[0]
          errors = conn.execute(\"SELECT COUNT(*) FROM transactions WHERE enrichment_status = 'error'\").fetchone()[0]
          pending = conn.execute(\"SELECT COUNT(*) FROM transactions WHERE (enrichment_status IS NULL OR (enrichment_status = 'error' AND enrichment_attempts < 3)) AND source_url IS NOT NULL\").fetchone()[0]
          conn.close()

          pending_before = int(os.environ.get('PENDING_BEFORE', '0'))
          attempted = pending_before - pending if pending_before > pending else 0
          newly_enriched = attempted  # approximate

          alert = False
          reasons = []

          # Were there pending URLs but zero got enriched?
          if pending_before > 10 and attempted == 0:
              alert = True
              reasons.append(f'Zero URLs enriched despite {pending_before} pending. Redfin DOM may have changed.')

          # High error rate this run?
          # Note: per-run error rate is covered by the cumulative check below.
          # 'attempted' = URLs that changed from pending this run.

          # Overall: if >50% of all attempted URLs across all runs are errors
          total_attempted = success + no_agent + errors
          if total_attempted > 20 and errors / total_attempted > 0.5:
              alert = True
              reasons.append(f'Error rate is {errors}/{total_attempted} ({100*errors//total_attempted}%). Redfin may be blocking.')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ALERT={\"true\" if alert else \"false\"}\n')
              msg = f'Agent Scraper Health Check FAILED\n\nTotal: {total} | Success: {success} | No Agent: {no_agent} | Errors: {errors} | Pending: {pending}\n\nIssues:\n' + '\n'.join(f'- {r}' for r in reasons)
              # Escape newlines for GitHub Actions output
              msg_escaped = msg.replace('\n', '%0A')
              f.write(f'ALERT_MSG={msg_escaped}\n')

          print(f'Health check: total={total} success={success} no_agent={no_agent} errors={errors} pending={pending}')
          if alert:
              print(f'ALERT: {reasons}')
          else:
              print('All good.')
          "
        env:
          PENDING_BEFORE: ${{ steps.enrich.outputs.pending_before || '0' }}

      - name: Alert on enrichment failure
        if: always() && steps.health.outputs.ALERT == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_MSG: ${{ steps.health.outputs.ALERT_MSG }}
        run: |
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText

          user = os.environ['GMAIL_USER'].strip().replace('\xa0', '')
          pwd = os.environ['GMAIL_APP_PASSWORD'].strip().replace('\xa0', '')
          body = os.environ.get('ALERT_MSG', 'Enrichment alert triggered but no details available.')

          msg = MIMEText(body)
          msg['Subject'] = 'Agent Scraper Alert - enrichment issue detected'
          msg['From'] = user
          msg['To'] = 'lucas.knowles@grandwelcome.com'

          with smtplib.SMTP('smtp.gmail.com', 587) as server:
              server.starttls()
              server.login(user, pwd)
              server.send_message(msg)
              print('Alert email sent to lucas.knowles@grandwelcome.com')
          "

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: agent scrape $(date -u +%Y-%m-%d-%H%M)"
          # Try rebase first (cleanest history), fall back to merge on conflict
          git pull --rebase origin main || {
            echo "Rebase failed, aborting and trying merge..."
            git rebase --abort
            git pull --no-rebase origin main
          }
          git push || {
            echo "Push failed, retrying once..."
            git pull --rebase origin main
            git push
          }

      - name: Prepare Pages artifact
        if: always()
        run: |
          mkdir -p _site
          cp data/dashboard.html _site/index.html
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4
