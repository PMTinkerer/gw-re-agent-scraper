name: Test Email Alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ Agent Scraper — Email alerts working!"
          to: lucas.knowles@grandwelcome.com
          from: ${{ secrets.GMAIL_USER }}
          body: "This is a test email from the gw-agent-scraper GitHub Actions workflow. If you're reading this, email alerts are wired up correctly."
