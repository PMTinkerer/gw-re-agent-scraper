name: Test Email Alert

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test email
        run: |
          python3 -c "
          import smtplib
          from email.mime.text import MIMEText

          msg = MIMEText('This is a test email from the gw-agent-scraper GitHub Actions workflow. If you are reading this, email alerts are wired up correctly.')
          msg['Subject'] = 'Agent Scraper - Email alerts working'
          msg['From'] = '${{ secrets.GMAIL_USER }}'
          msg['To'] = 'lucas.knowles@grandwelcome.com'

          with smtplib.SMTP('smtp.gmail.com', 587) as server:
              server.ehlo()
              server.starttls()
              server.ehlo()
              user = '${{ secrets.GMAIL_USER }}'.strip().replace('\xa0', '')
              pwd = '${{ secrets.GMAIL_APP_PASSWORD }}'.strip().replace('\xa0', '')
              server.login(user, pwd)
              server.send_message(msg)
              print('Email sent successfully')
          "
